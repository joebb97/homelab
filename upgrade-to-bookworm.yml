- name: Upgrade Debian 11 bullseye to Debian 12 bookworm
  hosts: vms
  become: true
  serial: 1

  vars:
    debian_components: "main contrib non-free non-free-firmware"

  tasks:
    - name: Confirm host is Debian
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Debian"
        fail_msg: "This playbook only supports Debian."

    - name: Confirm host is bullseye
      ansible.builtin.assert:
        that:
          - ansible_distribution_major_version == "11"
        fail_msg: "Host is not Debian 11 bullseye."

    - name: Check for broken packages
      ansible.builtin.command: dpkg --audit
      register: dpkg_audit
      changed_when: false
      failed_when: dpkg_audit.stdout | length > 0

    - name: Update bullseye package index
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Fully update current bullseye system
      ansible.builtin.apt:
        upgrade: full
        autoremove: true

    - name: Back up APT config
      ansible.builtin.command: cp -a /etc/apt /etc/apt.bak.bullseye-to-bookworm
      args:
        creates: /etc/apt.bak.bullseye-to-bookworm

    - name: Disable third-party APT source list files
      ansible.builtin.shell: |
        set -eu
        for f in /etc/apt/sources.list.d/*.list; do
          [ -e "$f" ] || continue
          mv "$f" "$f.disabled-for-bookworm-upgrade"
        done
      changed_when: false

    - name: Write Debian bookworm sources
      ansible.builtin.copy:
        dest: /etc/apt/sources.list
        owner: root
        group: root
        mode: "0644"
        content: |
          deb http://deb.debian.org/debian bookworm {{ debian_components }}
          deb http://deb.debian.org/debian bookworm-updates {{ debian_components }}
          deb http://security.debian.org/debian-security bookworm-security {{ debian_components }}

    - name: Update bookworm package index
      ansible.builtin.apt:
        update_cache: true

    - name: Minimal upgrade to bookworm
      ansible.builtin.apt:
        upgrade: safe

    - name: Full upgrade to bookworm
      ansible.builtin.apt:
        upgrade: full
        autoremove: true

    - name: Reboot into upgraded system
      ansible.builtin.reboot:
        reboot_timeout: 900

    - name: Refresh facts after reboot
      ansible.builtin.setup:

    - name: Confirm host is now bookworm
      ansible.builtin.assert:
        that:
          - ansible_distribution_major_version == "12"
        fail_msg: "Upgrade did not finish cleanly; host is not Debian 12."

    - name: Check failed services
      ansible.builtin.command: systemctl --failed --no-pager
      register: failed_services
      changed_when: false

    - name: Show failed services
      ansible.builtin.debug:
        var: failed_services.stdout_lines
