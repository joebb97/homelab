- hosts: juniper_switches
  gather_facts: no
  tags:
    - juniper
  vars:
    ansible_connection: netconf
    ansible_network_os: junos
    # ansible_connection: local
    # host: "{{ inventory_hostname }}"
    # user: root
  roles:
    - juniper-switches

- hosts: swos
  gather_facts: no
  connection: local
  tags:
    - mikrotik
    - swos
  roles:
    - mikrotik-swos

- hosts: routeros
  gather_facts: no
  connection: local
  module_defaults:
    group/community.routeros.api:
      hostname: "{{ ansible_host }}"
      password: "{{ mikrotik_routeros.creds[ansible_host].password }}"
      username: admin
      # The following options configure TLS/SSL.
      # Depending on your setup, these options need different values:
      tls: true
      validate_certs: true
      validate_cert_hostname: true
      # If you are using your own PKI, specify the path to your CA certificate here:
      ca_path: "roles/mikrotik-routeros/files/{{ ansible_host}}.pem"
  tags:
    - mikrotik
    - routeros
  roles:
    - mikrotik-routeros
